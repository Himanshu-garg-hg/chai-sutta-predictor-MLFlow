apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow-server-deployment
  namespace: default
  labels:
    app: mlflow-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow-server
  template:
    metadata:
      name: mlflow-server-pod
      labels:
        app: mlflow-server
    spec:
      containers:
      - name: mlflow-server-container
        image: modalacr.azurecr.io/mlflow-server:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
        env:
        - name: AZURE_STORAGE_ACCOUNT
          value: modalstorageacc

        - name: AZURE_STORAGE_KEY
          valueFrom:
            secretKeyRef:
              name: storage-account-secret
              key: AZURE_STORAGE_KEY

